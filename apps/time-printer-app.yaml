apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: time-printer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: apps
  source:
    path: apps/time-printer
    repoURL: "https://github.com/lansfy/argocdtest.git"
    targetRevision: HEAD
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
