apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: 'argocd'
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: 'in-cluster'
    namespace: 'apps'
  source:
    path: apps
    repoURL: 'https://github.com/lansfy/argocdtest.git'
    targetRevision: HEAD
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
